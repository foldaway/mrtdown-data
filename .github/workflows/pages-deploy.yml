# Publish static data (including manifest.json) to GitHub Pages.
# In repo Settings → Pages, set Source to "GitHub Actions".

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - duncanleo/data-overhaul
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production static data
        run: |
          mkdir -p pages-dist
          cp -R data/. pages-dist/
          npm run cli -- -- --data-dir "$GITHUB_WORKSPACE/pages-dist" manifest
          npm run cli -- -- --data-dir "$GITHUB_WORKSPACE/pages-dist" pages-index

      - name: Create production archives
        run: |
          mkdir -p archive-root
          cp -R pages-dist archive-root/data
          tar -czf pages-dist/archive.tar.gz -C archive-root data
          (cd archive-root && zip -rq "$GITHUB_WORKSPACE/pages-dist/archive.zip" data)

      - name: Build fixture static data
        run: |
          mkdir -p pages-dist/fixtures
          cp -R data/. pages-dist/fixtures/
          cp -R fixtures/data/. pages-dist/fixtures/
          npm run cli -- -- --data-dir "$GITHUB_WORKSPACE/pages-dist/fixtures" manifest
          npm run cli -- -- --data-dir "$GITHUB_WORKSPACE/pages-dist/fixtures" pages-index

      - name: Create fixture archives
        run: |
          mkdir -p fixture-archive-root
          cp -R pages-dist/fixtures fixture-archive-root/data
          tar -czf pages-dist/fixtures/archive.tar.gz -C fixture-archive-root data
          (cd fixture-archive-root && zip -rq "$GITHUB_WORKSPACE/pages-dist/fixtures/archive.zip" data)

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
