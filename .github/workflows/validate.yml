name: Validate Data

on:
  pull_request:
    paths:
      - 'data/**'
      - 'src/repo/**'
      - 'src/cli/**'
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'src/repo/**'
      - 'src/cli/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run cli -- -- validate
