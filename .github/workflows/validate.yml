name: Validate

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/**'
      - 'data/**'
      - 'fixtures/**'
      - 'docs/**'
      - 'package*.json'
      - 'packages/**'
      - 'scripts/**'
      - 'turbo.json'
      - 'biome.json'
      - 'vitest.config.ts'
  push:
    branches:
      - main
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/**'
      - 'data/**'
      - 'fixtures/**'
      - 'docs/**'
      - 'package*.json'
      - 'packages/**'
      - 'scripts/**'
      - 'turbo.json'
      - 'biome.json'
      - 'vitest.config.ts'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build:packages
      - run: npm run typecheck
      - run: npm run data:validate
      - run: npm run fixtures:validate
      - run: npm test
      - run: npm run test:packages
